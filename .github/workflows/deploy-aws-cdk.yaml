name: Deploy AWS CDK
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: cdk-deploy
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    # these permissions are needed to interact with GitHub's OIDC Token endpoint
    permissions:
      id-token: write
      contents: read
    env:
      AWS_DEFAULT_REGION: us-east-1
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Setup Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            functions/counter/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install Cargo Lambda
        run: |
          pip install cargo-lambda
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: |
          pnpm install
      - uses: goto-bus-stop/setup-zig@v2
      - name: Build Lambda function
        run: |
          pnpm build:function
          ls functions/counter/target/lambda/counter/bootstrap
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: gh-actions-sean-krail-website-backend-main
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
      - name: AWS CDK Synth
        run: |
          pnpm build:cdk
          pnpm cdk synth
      - name: AWS CDK Diff
        run: |
          pnpm cdk diff
      - name: AWS CDK Deploy
        run: |
          pnpm cdk deploy --require-approval never
          pnpm cdk gc --confirm false --rollback-buffer-days 1 --unstable gc
